# Mod de traduccion al espanol para Banjo-Kazooie: Recompiled

[manifest]

id = "bk_spanish_translation"

version = "3.2.0"

display_name = "Spanish Language"

description = """
Traduccion completa al espanol latino de Banjo-Kazooie: Recompiled. \
Todos los dialogos, menus, quiz y escenas traducidos. \
Los nombres de los mundos (letreros) aun no estan traducidos. \
Las traducciones fueron generadas con IA (Claude Code) y pueden contener errores. \
Si encuentras algun fallo, reportalo en GitHub. \
--- Creditos --- \
Traduccion y edicion: wilrojasdev | \
Desarrollo del mod: Claude Code (Anthropic) | \
Referencia de estructura: V10lator (mod aleman) | \
Asset Expansion Pak: Dario | \
HD Textures: GhostlyDark (BK Reloaded)
"""

short_description = "Traduccion al espanol latino."

authors = [ "wilrojasdev" ]

game_id = "bk"

minimum_recomp_version = "1.0.1"

dependencies = [ "bk_recomp_asset_expansion_pak:0.0.3" ]

optional_dependencies = []

conflicts = []

native_libraries = []

[inputs]

elf_path = "build/mod.elf"

mod_filename = "bk_spanish_translation"

func_reference_syms_file = "BanjoRecompSyms/bk.us.rev0.syms.toml"
data_reference_syms_files = [ "BanjoRecompSyms/bk.us.rev0.datasyms.toml" ]

additional_files = [
    "thumb.png",
    "rt64.json",
    "fonts/excl_inv.png",
    "fonts/quest_inv.png",
    "fonts/A_acute.png",
    "fonts/E_acute.png",
    "fonts/I_acute.png",
    "fonts/N_tilde.png",
    "fonts/O_acute.png",
    "fonts/U_acute.png"
]
